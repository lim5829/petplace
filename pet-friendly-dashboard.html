<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>PetPlace</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ── 기본 ── */
:root {
  --brown:  #5C3D2E;
  --terra:  #C4724A;
  --cream:  #F7F3EE;
  --gray1:  #E8E2DA;
  --gray2:  #BBBBBB;
  --gray3:  #888888;
  --white:  #FFFFFF;
  --charcoal:#2C2C2C;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
  --r: 16px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; background:var(--cream); font-family:'Noto Sans KR',sans-serif; color:var(--charcoal); }

/* ── 앱 구조 ── */
#app {
  display:flex; flex-direction:column;
  height:100%; padding-top:var(--safe-top);
}

/* ── 헤더 ── */
.hdr {
  background:var(--brown);
  padding:14px 18px 12px;
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
}
.hdr-logo { font-size:18px; font-weight:700; color:var(--cream); display:flex; align-items:center; gap:7px; }
.paw { display:inline-block; animation:wiggle 2.8s ease-in-out infinite; }
@keyframes wiggle { 0%,100%{transform:rotate(-10deg)} 50%{transform:rotate(10deg)} }
.hdr-loc {
  background:rgba(255,255,255,0.14); border:1px solid rgba(255,255,255,0.22);
  color:var(--cream); padding:5px 13px; border-radius:20px; font-size:12px;
  font-family:inherit; cursor:pointer; display:flex; align-items:center; gap:5px;
  transition:background .2s;
}
.hdr-loc:active { background:rgba(255,255,255,0.28); }

/* ── 배너 ── */
.banner {
  padding:8px 16px; font-size:12px; line-height:1.5;
  background:#FEF4EE; color:#8B5733; border-bottom:1px solid #F0D5C4;
  flex-shrink:0;
}
.banner.live { background:#EFF7F1; color:#3B6E47; border-color:#C2DEC7; }

/* ── 필터 바 ── */
.filter-bar {
  background:var(--white); border-bottom:1px solid var(--gray1);
  padding:10px 14px; flex-shrink:0;
  display:flex; flex-direction:column; gap:8px;
}
.filter-row { display:flex; align-items:center; gap:8px; }
.chips { display:flex; gap:7px; overflow-x:auto; flex:1; }
.chips::-webkit-scrollbar { display:none; }
.chip {
  padding:5px 14px; border-radius:20px; border:1.5px solid var(--gray1);
  background:var(--white); font-size:13px; white-space:nowrap;
  font-family:inherit; color:var(--charcoal); cursor:pointer; transition:all .15s;
  flex-shrink:0;
}
.chip.active { background:var(--terra); border-color:var(--terra); color:#fff; font-weight:500; }
.sort-sel {
  padding:5px 10px; border:1.5px solid var(--gray1); border-radius:9px;
  font-size:12px; background:var(--white); color:var(--charcoal);
  font-family:inherit; outline:none; flex-shrink:0;
}
.result-count { font-size:12px; color:var(--gray3); margin-left:auto; white-space:nowrap; }
.result-count b { color:var(--terra); }

/* ── 검색 ── */
.search-wrap { position:relative; }
.search-ico { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:14px; color:var(--gray2); pointer-events:none; }
.search-inp {
  width:100%; padding:9px 12px 9px 36px;
  border:1.5px solid var(--gray1); border-radius:11px;
  font-size:14px; font-family:inherit; background:var(--cream); outline:none;
  transition:border-color .2s;
}
.search-inp:focus { border-color:var(--terra); }

/* ── 카드 목록 ── */
.list-wrap { flex:1; overflow-y:auto; padding:10px 12px 80px; display:flex; flex-direction:column; gap:9px; }
.list-wrap::-webkit-scrollbar { display:none; }

/* 빈/로딩 */
.empty, .loading-wrap { padding:50px 20px; text-align:center; color:var(--gray2); }
.empty .ico { font-size:48px; margin-bottom:12px; }
.empty p { font-size:14px; line-height:1.7; }
.loading-wrap { display:flex; flex-direction:column; align-items:center; gap:14px; font-size:13px; }
.spinner { width:28px; height:28px; border:3px solid var(--gray1); border-top-color:var(--terra); border-radius:50%; animation:spin .75s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* ── 카드 ── */
.card {
  background:var(--white); border:1.5px solid var(--gray1); border-radius:var(--r);
  padding:14px; cursor:pointer; transition:all .15s; position:relative; overflow:hidden;
  -webkit-user-select:none;
}
.card::before { content:''; position:absolute; left:0;top:0;bottom:0; width:4px; background:var(--gray1); transition:background .15s; }
.card:active { transform:scale(.985); }
.card.sel { border-color:var(--terra); background:#FEF9F6; }
.card.sel::before { background:var(--terra); }

.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:5px; }
.card-name { font-size:14px; font-weight:600; line-height:1.4; flex:1; }
.cat-badge { font-size:11px; padding:2px 9px; border-radius:9px; font-weight:500; white-space:nowrap; margin-left:8px; flex-shrink:0; }
.cat-일반음식점 { background:#DCF0E2; color:#3A7045; }
.cat-휴게음식점 { background:#FDE8DC; color:#C4724A; }
.cat-제과점    { background:#FDF5DC; color:#A0822A; }
.cat-기타      { background:#EDEDED; color:#666; }

.card-addr { font-size:12px; color:var(--gray3); margin-bottom:8px; line-height:1.5; }
.card-foot { display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
.card-dist { font-size:12px; color:var(--terra); font-weight:700; }
.pet-tag { font-size:11px; padding:2px 8px; background:#FDE8DC; color:var(--terra); border-radius:6px; font-weight:500; }

/* ── 하단 상세 시트 ── */
.sheet-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.38); z-index:100;
  opacity:0; pointer-events:none; transition:opacity .25s;
}
.sheet-overlay.show { opacity:1; pointer-events:auto; }

.sheet {
  position:fixed; left:0; right:0; bottom:0; z-index:101;
  background:var(--white); border-radius:22px 22px 0 0;
  padding:0 0 calc(20px + var(--safe-bot));
  max-height:88vh; overflow-y:auto;
  transform:translateY(100%); transition:transform .3s cubic-bezier(.32,.72,0,1);
  box-shadow:0 -8px 40px rgba(0,0,0,0.14);
}
.sheet::-webkit-scrollbar { display:none; }
.sheet.show { transform:translateY(0); }

.sheet-handle {
  width:38px; height:4px; background:var(--gray1); border-radius:2px;
  margin:12px auto 0; flex-shrink:0;
}
.sheet-head {
  padding:14px 20px 0;
  display:flex; justify-content:space-between; align-items:flex-start;
}
.sheet-name { font-size:20px; font-weight:700; line-height:1.3; flex:1; }
.sheet-close {
  background:var(--cream); border:none; border-radius:50%;
  width:30px; height:30px; display:flex; align-items:center; justify-content:center;
  font-size:14px; color:var(--gray3); cursor:pointer; flex-shrink:0; margin-left:10px;
}
.sheet-badges { padding:8px 20px 0; display:flex; gap:7px; flex-wrap:wrap; }
.badge { font-size:11px; padding:3px 11px; border-radius:11px; font-weight:500; }
.badge-pet  { background:#FDE8DC; color:var(--terra); }
.badge-일반음식점 { background:#DCF0E2; color:#3A7045; }
.badge-휴게음식점 { background:#FDE8DC; color:#C4724A; }
.badge-제과점    { background:#FDF5DC; color:#A0822A; }
.badge-기타      { background:#EDEDED; color:#666; }
.badge-open   { background:#EFF7F1; color:#3B6E47; }
.badge-closed { background:#FFEDED; color:#C44A4A; }

.pet-notice {
  margin:14px 20px 0;
  background:linear-gradient(135deg,#FDE8DC,#F7F3EE);
  border:1px solid #F0C8A8; border-radius:12px;
  padding:12px 15px; font-size:12px; color:#8B5733; line-height:1.8;
}
.pet-notice strong { color:var(--terra); }

.detail-sec { margin:12px 20px 0; }
.detail-sec-title { font-size:11px; color:#bbb; font-weight:500; letter-spacing:.5px; text-transform:uppercase; margin-bottom:10px; }
.info-row { display:flex; gap:10px; margin-bottom:8px; align-items:flex-start; }
.info-row:last-child { margin-bottom:0; }
.info-lbl { font-size:13px; color:var(--gray3); min-width:70px; flex-shrink:0; padding-top:1px; }
.info-val { font-size:13px; color:var(--charcoal); line-height:1.5; }

.sheet-actions {
  padding:16px 20px 0;
  display:grid; grid-template-columns:1fr 1fr; gap:10px;
}
.btn-p {
  padding:13px; background:var(--terra); color:#fff; border:none;
  border-radius:12px; font-size:14px; font-family:inherit; font-weight:600;
  cursor:pointer; transition:background .2s;
}
.btn-p:active { background:#b5633d; }
.btn-s {
  padding:13px; background:var(--cream); color:var(--charcoal);
  border:1.5px solid var(--gray1); border-radius:12px; font-size:14px;
  font-family:inherit; cursor:pointer; transition:all .2s;
}
.btn-s:active { border-color:var(--terra); color:var(--terra); }

/* ── 토스트 ── */
.toast {
  position:fixed; bottom:calc(30px + var(--safe-bot)); left:50%; transform:translateX(-50%);
  background:#2C2C2C; color:#fff; padding:10px 20px; border-radius:20px;
  font-size:13px; z-index:200; opacity:0; pointer-events:none;
  transition:opacity .22s; white-space:nowrap;
}
.toast.show { opacity:1; }
</style>
</head>
<body>
<div id="app">

  <!-- 헤더 -->
  <header class="hdr">
    <div class="hdr-logo"><span class="paw">🐾</span> PetPlace</div>
    <button class="hdr-loc" id="locBtn" onclick="getLocation()">
      📍 <span id="locText">내 위치</span>
    </button>
  </header>

  <!-- 상태 배너 -->
  <div class="banner" id="banner">⚠️ <span id="bannerText">내 위치 버튼을 눌러 주변 업소를 찾아보세요</span></div>

  <!-- 필터 바 -->
  <div class="filter-bar">
    <div class="filter-row">
      <div class="chips" id="chips">
        <button class="chip active" data-cat="전체">전체</button>
        <button class="chip" data-cat="일반음식점">🍽 일반음식점</button>
        <button class="chip" data-cat="휴게음식점">☕ 휴게음식점</button>
        <button class="chip" data-cat="제과점">🥐 제과점</button>
      </div>
      <select class="sort-sel" id="sortSel" onchange="renderFiltered()">
        <option value="dist">📍 거리순</option>
        <option value="name">가나다순</option>
      </select>
    </div>
    <div class="filter-row">
      <div class="search-wrap" style="flex:1">
        <span class="search-ico">🔍</span>
        <input class="search-inp" id="searchInp" placeholder="업소명 · 주소 검색" oninput="renderFiltered()">
      </div>
      <span class="result-count"><b id="cnt">0</b>개</span>
    </div>
  </div>

  <!-- 카드 목록 -->
  <div class="list-wrap" id="listWrap">
    <div class="empty"><div class="ico">📍</div><p>내 위치를 설정하면<br>주변 반려동물 동반 가능 업소를<br>불러옵니다</p></div>
  </div>

</div>

<!-- 오버레이 -->
<div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>

<!-- 상세 시트 -->
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <div class="sheet-name" id="sheetName"></div>
    <button class="sheet-close" onclick="closeSheet()">✕</button>
  </div>
  <div class="sheet-badges" id="sheetBadges"></div>
  <div class="pet-notice">
    <strong>🐶 반려동물 동반 출입 안내</strong><br>
    개·고양이에 한해 허용됩니다. 조리장·식재료창고 출입은 제한되며,
    방문 전 <strong>예방접종 여부</strong>와 업소 최신 정책을 꼭 확인하세요. (식약처 2026.3.1 시행)
  </div>
  <div class="detail-sec">
    <div class="detail-sec-title">업소 정보</div>
    <div id="sheetInfo"></div>
  </div>
  <div class="sheet-actions" id="sheetActions"></div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  설정
// ═══════════════════════════════════════════
// ⚡ Vercel 프록시 URL — 배포 후 실제 주소로 교체
// 예: https://petplace-proxy.vercel.app/api/proxy
const PROXY_URL = 'https://petplace-proxy.vercel.app/api/proxy';
const PAGE      = 500;

// ═══════════════════════════════════════════
//  상태
// ═══════════════════════════════════════════
let allData   = [];
let filtered  = [];
let currentCat  = '전체';
let selectedId  = null;
let userLat = null, userLng = null;

// ═══════════════════════════════════════════
//  앱 시작 — 자동으로 위치 요청
// ═══════════════════════════════════════════
window.addEventListener('load', () => {
  // WebView에서 페이지 로드 시 바로 위치 요청
  setTimeout(getLocation, 400);
});

// ═══════════════════════════════════════════
//  위치 취득
// ═══════════════════════════════════════════
function getLocation() {
  document.getElementById('locText').textContent = '확인 중...';
  if (!navigator.geolocation) {
    // WebView가 네이티브 위치를 직접 주입하는 경우 대비
    checkNativeLocation();
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      document.getElementById('locText').textContent = '현재 위치';
      fetchMFDS();
    },
    err => {
      // 권한 거부 시 서울 중심 기본값
      userLat = 37.5665; userLng = 126.9780;
      document.getElementById('locText').textContent = '서울 기준';
      fetchMFDS();
    },
    { enableHighAccuracy: true, timeout: 8000 }
  );
}

// 앱인토스가 네이티브 위치를 window.nativeLocation 으로 주입하는 경우 처리
function checkNativeLocation() {
  if (window.nativeLocation) {
    userLat = window.nativeLocation.lat;
    userLng = window.nativeLocation.lng;
    document.getElementById('locText').textContent = '현재 위치';
    fetchMFDS();
  } else {
    userLat = 37.5665; userLng = 126.9780;
    document.getElementById('locText').textContent = '서울 기준';
    fetchMFDS();
  }
}

// ═══════════════════════════════════════════
//  타임아웃 fetch (WebView 호환)
// ═══════════════════════════════════════════
// XMLHttpRequest 기반 — WebView CORS 우회
function fetchWithTimeout(url, ms) {
  ms = ms || 10000;
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.timeout = ms;
    xhr.onload = function() {
      resolve({
        ok: xhr.status >= 200 && xhr.status < 300,
        status: xhr.status,
        json: function() {
          return new Promise(function(res, rej) {
            try { res(JSON.parse(xhr.responseText)); }
            catch(e) { rej(e); }
          });
        }
      });
    };
    xhr.onerror   = function() { reject(new Error('network error')); };
    xhr.ontimeout = function() { reject(new Error('timeout')); };
    xhr.send();
  });
}

// ═══════════════════════════════════════════
//  식약처 API 호출
// ═══════════════════════════════════════════
async function fetchMFDS() {
  setBanner('', '🔄 식약처 데이터 불러오는 중...');
  renderLoading();

  // 1차: petYn=Y 파라미터 직접 필터
  try {
    const res = await fetchWithTimeout(`${PROXY_URL}?start=1&end=${PAGE}&petYn=Y`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const rows = json?.COOKRST?.row;
    if (!Array.isArray(rows) || rows.length === 0) throw new Error('petYn 파라미터 미지원');

    allData = rows.map(parseRow);
    onDataLoaded('live', `✅ 식약처 실시간 연동 · ${allData.length}개 업소`);
    return;
  } catch (e1) {
    console.warn('[1차 시도 실패]', e1.message);
  }

  // 2차: 전체 조회 후 프론트 petYn 필터
  try {
    const res = await fetchWithTimeout(`${PROXY_URL}?start=1&end=${PAGE}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const rows = json?.COOKRST?.row;
    if (!Array.isArray(rows) || rows.length === 0) throw new Error('데이터 없음');

    const petRows = rows.map(parseRow).filter(p => /y/i.test(p.petYn));
    allData = petRows.length > 0 ? petRows : rows.map(parseRow);
    onDataLoaded('live', `✅ 식약처 연동 · ${allData.length}개 업소`);
    return;
  } catch (e2) {
    console.warn('[2차 시도 실패]', e2.message);
  }

  // 폴백: 샘플 데이터
  allData = SAMPLE_DATA;
  onDataLoaded('', '⚠️ API 연결 실패 · 샘플 데이터 표시 중');
}

function onDataLoaded(bannerType, bannerMsg) {
  // 거리 계산
  allData.forEach(p => {
    p.dist = (userLat && p.lat && p.lng)
      ? haversine(userLat, userLng, p.lat, p.lng)
      : 99;
  });
  setBanner(bannerType, bannerMsg);
  renderFiltered();
}

// ═══════════════════════════════════════════
//  데이터 파싱
// ═══════════════════════════════════════════
function parseRow(r, i) {
  return {
    id:      r.MGTNO      || `r${i}`,
    name:    r.BPLCNM     || '이름 없음',
    cat:     mapCat(r.UPTAENM || ''),
    addr:    r.RDNWHLADDR || r.SITEWHLADDR || '',
    phone:   r.SITETEL    || '-',
    status:  r.DTLSTATENM || '',
    lat:     parseFloat(r.Y) || null,
    lng:     parseFloat(r.X) || null,
    petYn:   r.petYn      || '',
    dist:    99,
  };
}

function mapCat(s) {
  if (s.includes('일반음식점')) return '일반음식점';
  if (s.includes('휴게음식점')) return '휴게음식점';
  if (s.includes('제과'))       return '제과점';
  return '기타';
}

// ═══════════════════════════════════════════
//  필터 + 정렬 + 렌더
// ═══════════════════════════════════════════
function renderFiltered() {
  const q    = document.getElementById('searchInp').value.toLowerCase();
  const sort = document.getElementById('sortSel').value;

  filtered = allData.filter(p => {
    const cOk = currentCat === '전체' || p.cat === currentCat;
    const qOk = !q || p.name.toLowerCase().includes(q) || p.addr.toLowerCase().includes(q);
    return cOk && qOk;
  });

  if (sort === 'dist') filtered.sort((a,b) => a.dist - b.dist);
  else filtered.sort((a,b) => a.name.localeCompare(b.name, 'ko'));

  document.getElementById('cnt').textContent = filtered.length;
  renderCards();
}

function renderCards() {
  const el = document.getElementById('listWrap');
  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty"><div class="ico">🐾</div><p>검색 결과가 없어요</p></div>`;
    return;
  }
  el.innerHTML = filtered.map(p => {
    const d = fmtDist(p.dist);
    return `
    <div class="card${p.id===selectedId?' sel':''}" id="c-${CSS.escape(p.id)}" onclick="openSheet('${ea(p.id)}')">
      <div class="card-top">
        <div class="card-name">${es(p.name)}</div>
        <span class="cat-badge cat-${p.cat}">${p.cat}</span>
      </div>
      <div class="card-addr">📍 ${es(p.addr)||'주소 미제공'}</div>
      <div class="card-foot">
        ${d ? `<span class="card-dist">📍 ${d}</span>` : ''}
        <span class="pet-tag">🐾 반려동물 동반 가능</span>
      </div>
    </div>`;
  }).join('');
}

function renderLoading() {
  document.getElementById('listWrap').innerHTML =
    `<div class="loading-wrap"><div class="spinner"></div><span>식약처 데이터 불러오는 중...</span></div>`;
}

// ═══════════════════════════════════════════
//  상세 시트
// ═══════════════════════════════════════════
function openSheet(id) {
  selectedId = id;
  const p = allData.find(x => x.id === id);
  if (!p) return;

  // 카드 선택 표시
  document.querySelectorAll('.card').forEach(c => c.classList.remove('sel'));
  const card = document.getElementById('c-'+CSS.escape(id));
  if (card) card.classList.add('sel');

  const d = fmtDist(p.dist);
  const statusBadge = p.status.includes('영업')
    ? `<span class="badge badge-open">🟢 영업</span>`
    : p.status ? `<span class="badge badge-closed">⛔ ${es(p.status)}</span>` : '';

  document.getElementById('sheetName').textContent = p.name;
  document.getElementById('sheetBadges').innerHTML =
    `<span class="badge badge-pet">🐾 반려동물 동반</span>
     <span class="badge badge-${p.cat}">${p.cat}</span>
     ${statusBadge}`;

  document.getElementById('sheetInfo').innerHTML = `
    <div class="info-row"><span class="info-lbl">주소</span><span class="info-val">${es(p.addr)||'정보 없음'}</span></div>
    <div class="info-row"><span class="info-lbl">전화</span><span class="info-val">${es(p.phone)}</span></div>
    <div class="info-row"><span class="info-lbl">업종</span><span class="info-val">${p.cat}</span></div>
    <div class="info-row"><span class="info-lbl">영업현황</span><span class="info-val">${es(p.status)||'미제공'}</span></div>
    ${d ? `<div class="info-row"><span class="info-lbl">거리</span><span class="info-val" style="color:var(--terra);font-weight:700">${d}</span></div>` : ''}`;

  document.getElementById('sheetActions').innerHTML =
    `<button class="btn-p" onclick="openNaver('${ea(p.name)}','${ea(p.addr)}')">🗺️ 네이버 지도</button>
     <button class="btn-s" onclick="callPhone('${ea(p.phone)}')">📞 전화</button>`;

  document.getElementById('sheet').classList.add('show');
  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow = '';
}

// ═══════════════════════════════════════════

document.getElementById('chips').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  currentCat = chip.dataset.cat;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  renderFiltered();
});

// ═══════════════════════════════════════════
//  유틸
// ═══════════════════════════════════════════
function haversine(a1,o1,a2,o2) {
  const R=6371, dA=(a2-a1)*Math.PI/180, dO=(o2-o1)*Math.PI/180;
  const a=Math.sin(dA/2)**2+Math.cos(a1*Math.PI/180)*Math.cos(a2*Math.PI/180)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function fmtDist(d) {
  if (d >= 99) return '';
  return d < 1 ? Math.round(d*1000)+'m' : d.toFixed(1)+'km';
}

function setBanner(type, text) {
  const el = document.getElementById('banner');
  el.className = 'banner' + (type==='live' ? ' live' : '');
  document.getElementById('bannerText').textContent = text;
}

function openNaver(name, addr) {
  // 앱인토스 WebView — 외부 앱 열기 시도
  const query = encodeURIComponent(name || addr);
  window.location.href = `nmap://search?query=${query}&appname=com.petplace`;
  // 네이버 지도 앱이 없으면 웹으로 fallback
  setTimeout(() => {
    window.open(`https://map.naver.com/v5/search/${query}`, '_blank');
  }, 1000);
}

function callPhone(phone) {
  if (!phone || phone === '-') { showToast('전화번호 정보가 없습니다'); return; }
  window.location.href = `tel:${phone.replace(/[^0-9]/g,'')}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function es(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function ea(s) {
  return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}
