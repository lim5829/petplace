<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>PetPlace</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --brown:  #5C3D2E;
  --terra:  #C4724A;
  --cream:  #F7F3EE;
  --gray1:  #E8E2DA;
  --gray2:  #BBBBBB;
  --gray3:  #888888;
  --white:  #FFFFFF;
  --charcoal:#2C2C2C;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
  --r: 16px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; background:var(--cream); font-family:'Noto Sans KR',sans-serif; color:var(--charcoal); }

#app { display:flex; flex-direction:column; height:100%; padding-top:var(--safe-top); }

/* 헤더 */
.hdr {
  background:var(--brown); padding:14px 18px 12px;
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.hdr-logo { font-size:18px; font-weight:700; color:var(--cream); display:flex; align-items:center; gap:7px; }
.paw { display:inline-block; animation:wiggle 2.8s ease-in-out infinite; }
@keyframes wiggle { 0%,100%{transform:rotate(-10deg)} 50%{transform:rotate(10deg)} }
.hdr-loc {
  background:rgba(255,255,255,0.14); border:1px solid rgba(255,255,255,0.22);
  color:var(--cream); padding:5px 13px; border-radius:20px; font-size:12px;
  font-family:inherit; cursor:pointer; display:flex; align-items:center; gap:5px;
}
.hdr-loc:active { background:rgba(255,255,255,0.28); }

/* 배너 */
.banner {
  padding:8px 16px; font-size:12px; line-height:1.5; flex-shrink:0;
  background:#FEF4EE; color:#8B5733; border-bottom:1px solid #F0D5C4;
}
.banner.live { background:#EFF7F1; color:#3B6E47; border-color:#C2DEC7; }

/* 필터 */
.filter-bar {
  background:var(--white); border-bottom:1px solid var(--gray1);
  padding:10px 14px; flex-shrink:0; display:flex; flex-direction:column; gap:8px;
}
.filter-row { display:flex; align-items:center; gap:8px; }
.chips { display:flex; gap:7px; overflow-x:auto; flex:1; }
.chips::-webkit-scrollbar { display:none; }
.chip {
  padding:5px 14px; border-radius:20px; border:1.5px solid var(--gray1);
  background:var(--white); font-size:13px; white-space:nowrap;
  font-family:inherit; color:var(--charcoal); cursor:pointer; flex-shrink:0;
}
.chip.active { background:var(--terra); border-color:var(--terra); color:#fff; font-weight:500; }
.sort-sel {
  padding:5px 10px; border:1.5px solid var(--gray1); border-radius:9px;
  font-size:12px; background:var(--white); color:var(--charcoal);
  font-family:inherit; outline:none; flex-shrink:0;
}
.result-count { font-size:12px; color:var(--gray3); margin-left:auto; white-space:nowrap; }
.result-count b { color:var(--terra); }

/* 검색 */
.search-wrap { position:relative; flex:1; }
.search-ico { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:14px; color:var(--gray2); pointer-events:none; }
.search-inp {
  width:100%; padding:9px 12px 9px 36px;
  border:1.5px solid var(--gray1); border-radius:11px;
  font-size:14px; font-family:inherit; background:var(--cream); outline:none;
}
.search-inp:focus { border-color:var(--terra); }

/* 카드 목록 */
.list-wrap { flex:1; overflow-y:auto; padding:10px 12px 80px; display:flex; flex-direction:column; gap:9px; }
.list-wrap::-webkit-scrollbar { display:none; }

.empty, .loading-wrap { padding:50px 20px; text-align:center; color:var(--gray2); }
.empty .ico { font-size:48px; margin-bottom:12px; }
.empty p { font-size:14px; line-height:1.7; }
.loading-wrap { display:flex; flex-direction:column; align-items:center; gap:14px; font-size:13px; }
.spinner { width:28px; height:28px; border:3px solid var(--gray1); border-top-color:var(--terra); border-radius:50%; animation:spin .75s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* 카드 */
.card {
  background:var(--white); border:1.5px solid var(--gray1); border-radius:var(--r);
  padding:14px; cursor:pointer; position:relative; overflow:hidden;
}
.card::before { content:''; position:absolute; left:0;top:0;bottom:0; width:4px; background:var(--gray1); transition:background .15s; }
.card:active { transform:scale(.985); }
.card.sel { border-color:var(--terra); background:#FEF9F6; }
.card.sel::before { background:var(--terra); }
.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:5px; }
.card-name { font-size:14px; font-weight:600; line-height:1.4; flex:1; }
.cat-badge { font-size:11px; padding:2px 9px; border-radius:9px; font-weight:500; white-space:nowrap; margin-left:8px; flex-shrink:0; }
.cat-일반음식점 { background:#DCF0E2; color:#3A7045; }
.cat-휴게음식점 { background:#FDE8DC; color:#C4724A; }
.cat-제과점    { background:#FDF5DC; color:#A0822A; }
.cat-기타      { background:#EDEDED; color:#666; }
.card-addr { font-size:12px; color:var(--gray3); margin-bottom:8px; line-height:1.5; }
.card-foot { display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
.card-dist { font-size:12px; color:var(--terra); font-weight:700; }
.pet-tag { font-size:11px; padding:2px 8px; background:#FDE8DC; color:var(--terra); border-radius:6px; font-weight:500; }

/* 시트 */
.sheet-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.38); z-index:100;
  opacity:0; pointer-events:none; transition:opacity .25s;
}
.sheet-overlay.show { opacity:1; pointer-events:auto; }
.sheet {
  position:fixed; left:0; right:0; bottom:0; z-index:101;
  background:var(--white); border-radius:22px 22px 0 0;
  padding:0 0 calc(20px + var(--safe-bot));
  max-height:88vh; overflow-y:auto;
  transform:translateY(100%); transition:transform .3s cubic-bezier(.32,.72,0,1);
  box-shadow:0 -8px 40px rgba(0,0,0,0.14);
}
.sheet::-webkit-scrollbar { display:none; }
.sheet.show { transform:translateY(0); }
.sheet-handle { width:38px; height:4px; background:var(--gray1); border-radius:2px; margin:12px auto 0; }
.sheet-head { padding:14px 20px 0; display:flex; justify-content:space-between; align-items:flex-start; }
.sheet-name { font-size:20px; font-weight:700; line-height:1.3; flex:1; }
.sheet-close {
  background:var(--cream); border:none; border-radius:50%;
  width:30px; height:30px; display:flex; align-items:center; justify-content:center;
  font-size:14px; color:var(--gray3); cursor:pointer; flex-shrink:0; margin-left:10px;
}
.sheet-badges { padding:8px 20px 0; display:flex; gap:7px; flex-wrap:wrap; }
.badge { font-size:11px; padding:3px 11px; border-radius:11px; font-weight:500; }
.badge-pet { background:#FDE8DC; color:var(--terra); }
.badge-일반음식점 { background:#DCF0E2; color:#3A7045; }
.badge-휴게음식점 { background:#FDE8DC; color:#C4724A; }
.badge-제과점    { background:#FDF5DC; color:#A0822A; }
.badge-기타      { background:#EDEDED; color:#666; }
.pet-notice {
  margin:14px 20px 0;
  background:linear-gradient(135deg,#FDE8DC,#F7F3EE);
  border:1px solid #F0C8A8; border-radius:12px;
  padding:12px 15px; font-size:12px; color:#8B5733; line-height:1.8;
}
.pet-notice strong { color:var(--terra); }
.detail-sec { margin:12px 20px 0; }
.detail-sec-title { font-size:11px; color:#bbb; font-weight:500; letter-spacing:.5px; text-transform:uppercase; margin-bottom:10px; }
.info-row { display:flex; gap:10px; margin-bottom:8px; align-items:flex-start; }
.info-row:last-child { margin-bottom:0; }
.info-lbl { font-size:13px; color:var(--gray3); min-width:70px; flex-shrink:0; padding-top:1px; }
.info-val { font-size:13px; color:var(--charcoal); line-height:1.5; }
.sheet-actions { padding:16px 20px 0; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.btn-p {
  padding:13px; background:var(--terra); color:#fff; border:none;
  border-radius:12px; font-size:14px; font-family:inherit; font-weight:600; cursor:pointer;
}
.btn-p:active { background:#b5633d; }
.btn-s {
  padding:13px; background:var(--cream); color:var(--charcoal);
  border:1.5px solid var(--gray1); border-radius:12px; font-size:14px;
  font-family:inherit; cursor:pointer;
}
.btn-s:active { border-color:var(--terra); color:var(--terra); }

/* 토스트 */
.toast {
  position:fixed; bottom:calc(30px + var(--safe-bot)); left:50%; transform:translateX(-50%);
  background:#2C2C2C; color:#fff; padding:10px 20px; border-radius:20px;
  font-size:13px; z-index:200; opacity:0; pointer-events:none; transition:opacity .22s; white-space:nowrap;
}
.toast.show { opacity:1; }
</style>
</head>
<body>
<div id="app">
  <header class="hdr">
    <div class="hdr-logo"><span class="paw">🐾</span> PetPlace</div>
    <button class="hdr-loc" id="locBtn" onclick="getLocation()">
      📍 <span id="locText">내 위치</span>
    </button>
  </header>

  <div class="banner" id="banner">⚠️ <span id="bannerText">내 위치 버튼을 눌러 주변 업소를 찾아보세요</span></div>

  <div class="filter-bar">
    <div class="filter-row">
      <div class="chips" id="chips">
        <button class="chip active" data-cat="전체">전체</button>
        <button class="chip" data-cat="일반음식점">🍽 일반음식점</button>
        <button class="chip" data-cat="휴게음식점">☕ 휴게음식점</button>
        <button class="chip" data-cat="제과점">🥐 제과점</button>
      </div>
      <select class="sort-sel" id="sortSel" onchange="renderFiltered()">
        <option value="dist">📍 거리순</option>
        <option value="name">가나다순</option>
      </select>
    </div>
    <div class="filter-row">
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input class="search-inp" id="searchInp" placeholder="업소명 · 주소 검색" oninput="renderFiltered()">
      </div>
      <span class="result-count"><b id="cnt">0</b>개</span>
    </div>
  </div>

  <div class="list-wrap" id="listWrap">
    <div class="empty"><div class="ico">📍</div><p>내 위치를 설정하면<br>주변 반려동물 동반 가능 업소를<br>불러옵니다</p></div>
  </div>
</div>

<div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <div class="sheet-name" id="sheetName"></div>
    <button class="sheet-close" onclick="closeSheet()">✕</button>
  </div>
  <div class="sheet-badges" id="sheetBadges"></div>
  <div class="pet-notice">
    <strong>🐶 반려동물 동반 출입 안내</strong><br>
    개·고양이에 한해 허용됩니다. 조리장·식재료창고 출입은 제한되며,
    방문 전 <strong>예방접종 여부</strong>와 업소 최신 정책을 꼭 확인하세요.
  </div>
  <div class="detail-sec">
    <div class="detail-sec-title">업소 정보</div>
    <div id="sheetInfo"></div>
  </div>
  <div class="sheet-actions" id="sheetActions"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===================================================
//  설정
// ===================================================
var PROXY = 'https://petplace-iota.vercel.app/api/proxy';

// ===================================================
//  상태
// ===================================================
var allData    = [];
var filtered   = [];
var currentCat = '전체';
var selectedId = null;
var userLat    = null;
var userLng    = null;

// ===================================================
//  앱 시작 — 자동 위치 요청
// ===================================================
window.addEventListener('load', function() {
  setTimeout(getLocation, 400);
});

// ===================================================
//  위치
// ===================================================
function getLocation() {
  document.getElementById('locText').textContent = '확인 중...';
  if (!navigator.geolocation) {
    userLat = 37.5665; userLng = 126.9780;
    document.getElementById('locText').textContent = '서울 기준';
    fetchKakao();
    return;
  }
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      document.getElementById('locText').textContent = '현재 위치';
      fetchKakao();
    },
    function() {
      userLat = 37.5665; userLng = 126.9780;
      document.getElementById('locText').textContent = '서울 기준';
      fetchKakao();
    },
    { enableHighAccuracy: true, timeout: 8000 }
  );
}

// ===================================================
//  카카오 API 호출 (Vercel 프록시 경유)
// ===================================================
function fetchKakao() {
  setBanner('', '🔄 식약처 데이터 불러오는 중...');
  renderLoading();

  var url = PROXY + '?start=1&end=500&petYn=Y';

  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.timeout = 15000;
  xhr.onload = function() {
    try {
      var json = JSON.parse(xhr.responseText);
      var rows = json && json.COOKRST && json.COOKRST.row;
      if (!Array.isArray(rows) || rows.length === 0) throw new Error('데이터 없음');
      allData = rows.map(parseMFDS);
      allData.forEach(function(p) {
        p.dist = (userLat && p.lat && p.lng) ? haversine(userLat, userLng, p.lat, p.lng) : 99;
      });
      allData.sort(function(a,b){ return a.dist - b.dist; });
      setBanner('live', '✅ 식약처 실시간 · ' + allData.length + '개 업소');
      renderFiltered();
    } catch(e) {
      loadSample();
    }
  };
  xhr.onerror   = function() { loadSample(); };
  xhr.ontimeout = function() { loadSample(); };
  xhr.send();
}

function loadSample() {
  allData = SAMPLE_DATA;
  allData.forEach(function(p) {
    p.dist = (userLat && p.lat && p.lng) ? haversine(userLat, userLng, p.lat, p.lng) : 99;
  });
  setBanner('', '⚠️ API 오류 · 샘플 데이터 표시 중');
  renderFiltered();
}

// ===================================================
//  카카오 응답 파싱
// ===================================================
function parseMFDS(r, i) {
  return {
    id:    r.MGTNO    || ('m' + i),
    name:  r.BPLCNM   || '이름 없음',
    cat:   mapCat(r.UPTAENM || ''),
    addr:  r.RDNWHLADDR || r.SITEWHLADDR || '',
    phone: r.SITETEL  || '-',
    status:r.DTLSTATENM || '',
    lat:   parseFloat(r.Y) || null,
    lng:   parseFloat(r.X) || null,
    url:   '',
    dist:  99
  };
}

function mapCat(s) {
  if (s.indexOf('일반음식점') >= 0) return '일반음식점';
  if (s.indexOf('휴게음식점') >= 0) return '휴게음식점';
  if (s.indexOf('제과') >= 0) return '제과점';
  return '기타';
}

// ===================================================
//  필터 + 정렬 + 렌더
// ===================================================
function renderFiltered() {
  var q    = document.getElementById('searchInp').value.toLowerCase();
  var sort = document.getElementById('sortSel').value;

  filtered = allData.filter(function(p) {
    var cOk = currentCat === '전체' || p.cat === currentCat;
    var qOk = !q || p.name.toLowerCase().indexOf(q) >= 0 || p.addr.toLowerCase().indexOf(q) >= 0;
    return cOk && qOk;
  });

  if (sort === 'dist') {
    filtered.sort(function(a,b) { return a.dist - b.dist; });
  } else {
    filtered.sort(function(a,b) { return a.name.localeCompare(b.name, 'ko'); });
  }

  document.getElementById('cnt').textContent = filtered.length;
  renderCards();
}

function renderCards() {
  var el = document.getElementById('listWrap');
  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty"><div class="ico">🐾</div><p>검색 결과가 없어요</p></div>';
    return;
  }
  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var p = filtered[i];
    var d = fmtDist(p.dist);
    var sel = p.id === selectedId ? ' sel' : '';
    html += '<div class="card' + sel + '" id="c-' + esc(p.id) + '" onclick="openSheet(\'' + eattr(p.id) + '\')">'
      + '<div class="card-top">'
      + '<div class="card-name">' + esc(p.name) + '</div>'
      + '<span class="cat-badge cat-' + p.cat + '">' + p.cat + '</span>'
      + '</div>'
      + '<div class="card-addr">📍 ' + (esc(p.addr) || '주소 미제공') + '</div>'
      + '<div class="card-foot">'
      + (d ? '<span class="card-dist">📍 ' + d + '</span>' : '')
      + '<span class="pet-tag">🐾 반려동물 동반 가능</span>'
      + '</div></div>';
  }
  el.innerHTML = html;
}

function renderLoading() {
  document.getElementById('listWrap').innerHTML =
    '<div class="loading-wrap"><div class="spinner"></div><span>주변 업소 검색 중...</span></div>';
}

// ===================================================
//  상세 시트
// ===================================================
function openSheet(id) {
  selectedId = id;
  var p = null;
  for (var i = 0; i < allData.length; i++) {
    if (allData[i].id === id) { p = allData[i]; break; }
  }
  if (!p) return;

  var cards = document.querySelectorAll('.card');
  for (var j = 0; j < cards.length; j++) cards[j].classList.remove('sel');
  var card = document.getElementById('c-' + id);
  if (card) { card.classList.add('sel'); card.scrollIntoView({ behavior:'smooth', block:'nearest' }); }

  var d = fmtDist(p.dist);
  document.getElementById('sheetName').textContent = p.name;
  document.getElementById('sheetBadges').innerHTML =
    '<span class="badge badge-pet">🐾 반려동물 동반</span>'
    + '<span class="badge badge-' + p.cat + '">' + p.cat + '</span>';

  document.getElementById('sheetInfo').innerHTML =
    '<div class="info-row"><span class="info-lbl">주소</span><span class="info-val">' + (esc(p.addr) || '정보 없음') + '</span></div>'
    + '<div class="info-row"><span class="info-lbl">전화</span><span class="info-val">' + esc(p.phone) + '</span></div>'
    + '<div class="info-row"><span class="info-lbl">업종</span><span class="info-val">' + p.cat + '</span></div>'
    + (d ? '<div class="info-row"><span class="info-lbl">거리</span><span class="info-val" style="color:var(--terra);font-weight:700">' + d + '</span></div>' : '');

  document.getElementById('sheetActions').innerHTML =
    '<button class="btn-p" onclick="openMap(\'' + eattr(p.id) + '\')">🗺️ 카카오맵</button>'
    + '<button class="btn-s" onclick="callPhone(\'' + eattr(p.phone) + '\')">📞 전화</button>';

  document.getElementById('sheet').classList.add('show');
  document.getElementById('overlay').classList.add('show');
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
}

// ===================================================
//  카테고리 칩
// ===================================================
document.getElementById('chips').addEventListener('click', function(e) {
  var chip = e.target.closest('.chip');
  if (!chip) return;
  currentCat = chip.dataset.cat;
  var chips = document.querySelectorAll('.chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
  chip.classList.add('active');
  renderFiltered(); // 식약처는 전체 로드 후 프론트 필터
});

// ===================================================
//  유틸
// ===================================================
function haversine(a1, o1, a2, o2) {
  var R = 6371;
  var dA = (a2-a1) * Math.PI / 180;
  var dO = (o2-o1) * Math.PI / 180;
  var a = Math.sin(dA/2)*Math.sin(dA/2)
        + Math.cos(a1*Math.PI/180)*Math.cos(a2*Math.PI/180)*Math.sin(dO/2)*Math.sin(dO/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fmtDist(d) {
  if (!d || d >= 99) return '';
  return d < 1 ? Math.round(d * 1000) + 'm' : d.toFixed(1) + 'km';
}

function setBanner(type, text) {
  var el = document.getElementById('banner');
  el.className = 'banner' + (type === 'live' ? ' live' : '');
  document.getElementById('bannerText').textContent = text;
}

function openMap(id) {
  var p = null;
  for (var i = 0; i < allData.length; i++) {
    if (allData[i].id === id) { p = allData[i]; break; }
  }
  if (!p) return;
  if (p.url) { window.open(p.url, '_blank'); return; }
  window.open('https://map.kakao.com/link/search/' + encodeURIComponent(p.name), '_blank');
}

function callPhone(phone) {
  if (!phone || phone === '-') { showToast('전화번호 정보가 없습니다'); return; }
  window.location.href = 'tel:' + phone.replace(/[^0-9]/g, '');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2400);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function eattr(s) {
  return String(s || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}
